<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — FlickZZ Resources</title>
    <link rel="icon" type="image/png" href="images/logo.png">
    <link rel="apple-touch-icon" href="images/logo.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/features.css">
    <!-- Cloudflare Turnstile -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body class="auth-page">
    <div class="auth-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="auth-wrapper">
        <a href="index.html" class="logo auth-logo">
            <img src="images/logo.png" alt="FlickZZ" class="logo-img logo-img-lg">
            <span>Flick<span class="logo-accent">ZZ</span></span>
        </a>

        <div class="auth-card">
            <div class="auth-header">
                <h1>Welcome Back</h1>
                <p>Log in to download premium resources.</p>
            </div>

            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <div class="input-wrap">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" required placeholder="you@example.com" autocomplete="email">
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrap">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
                        <button type="button" class="toggle-pass" data-target="password"><i class="fas fa-eye"></i></button>
                    </div>
                </div>

                <!-- Cloudflare Turnstile Widget -->
                <div class="cf-turnstile" data-sitekey="0x4AAAAAADiBJBn36bVOyOVZ" data-callback="onTurnstileSuccess"></div>
                <input type="hidden" id="cfToken" name="cf-turnstile-response">

                <button type="submit" class="btn btn-primary btn-block" id="loginSubmit">
                    <span>Log In</span>
                </button>
                <div class="divider"><span>or</span></div>
                <button type="button" class="btn btn-outline btn-block" id="googleLoginBtn">
                    <i class="fab fa-google"></i> Continue with Google
                </button>
            </form>

            <!-- Forgot Password Link -->
            <div class="auth-footer" style="margin-top: 1rem;">
                <a href="#" id="forgotPasswordLink" style="color: var(--primary);">Forgot password?</a>
            </div>
            <p class="auth-footer" style="margin-top: 0.5rem;">
                Don't have an account? <a href="signup.html">Sign up</a>
            </p>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script type="module" src="js/site-config.js"></script>
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/main.js"></script>
    <script type="module" src="js/login.js"></script>
    <script src="js/protection.js"></script>
    <script>
        // Turnstile success callback – store token in hidden input
        window.onTurnstileSuccess = function(token) {
            document.getElementById('cfToken').value = token;
        };
    </script>
</body>
</html>
