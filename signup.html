<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — FlickZZ Resources</title>
    <link rel="icon" type="image/png" href="images/logo.png">
    <link rel="apple-touch-icon" href="images/logo.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/features.css">
</head>
<body class="auth-page">
    <div class="auth-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="auth-wrapper">
        <a href="index.html" class="logo auth-logo">
            <img src="images/logo.png" alt="FlickZZ" class="logo-img logo-img-lg">
            <span>Flick<span class="logo-accent">ZZ</span></span>
        </a>

        <div class="auth-card">
            <div class="auth-header">
                <h1>Create Account</h1>
                <p>Join thousands of Minecraft creators.</p>
            </div>

            <form id="signupForm" class="auth-form">
                <div class="form-group">
                    <label for="displayName">Username</label>
                    <div class="input-wrap">
                        <i class="fas fa-user"></i>
                        <input type="text" id="displayName" required placeholder="CoolCrafter" minlength="3">
                    </div>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <div class="input-wrap">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" required placeholder="you@example.com" autocomplete="email">
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrap">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" required placeholder="At least 6 characters" minlength="6" autocomplete="new-password">
                        <button type="button" class="toggle-pass" data-target="password"><i class="fas fa-eye"></i></button>
                    </div>
                </div>
                <label class="checkbox">
                    <input type="checkbox" id="termsCheck" required>
                    <span>I agree to the <a href="terms.html" target="_blank">Terms</a> and <a href="privacy.html" target="_blank">Privacy Policy</a></span>
                </label>
                <button type="submit" class="btn btn-primary btn-block" id="signupSubmit">
                    <span>Create Account</span>
                </button>
                <div class="divider"><span>or</span></div>
                <button type="button" class="btn btn-outline btn-block" id="googleSignupBtn">
                    <i class="fab fa-google"></i> Continue with Google
                </button>
            </form>

            <p class="auth-footer">
                Already have an account? <a href="login.html">Log in</a>
            </p>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script type="module" src="js/site-config.js"></script>
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/main.js"></script>
    <script type="module" src="js/signup.js"></script>
    <script src="js/protection.js"></script>
</body>
</html>
