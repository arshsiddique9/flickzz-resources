<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password – FlickZZ</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
  <div class="auth-wrapper">
    <div class="auth-card">
      <h2>Set New Password</h2>
      <input type="password" id="newPassword" placeholder="New password (min 6 chars)">
      <input type="password" id="confirmPassword" placeholder="Confirm password">
      <button id="resetBtn" class="btn btn-primary">Reset Password</button>
    </div>
  </div>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    document.getElementById('resetBtn').onclick = async () => {
      const pwd = document.getElementById('newPassword').value;
      const confirm = document.getElementById('confirmPassword').value;
      if (pwd !== confirm) return alert('Passwords do not match');
      if (pwd.length < 6) return alert('Minimum 6 characters');
      const res = await fetch('/api/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, newPassword: pwd })
      });
      const data = await res.json();
      if (res.ok) alert('Password reset! Redirecting to login...');
      else alert(data.error);
      if (res.ok) setTimeout(() => location.href = '/login.html', 2000);
    };
  </script>
</body>
</html>
