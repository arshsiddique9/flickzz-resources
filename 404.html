<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — FlickZZ Resources</title>
    <link rel="icon" type="image/png" href="/images/logo.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/animations.css">
    <style>
        body { display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; }
        .err-code { font-size: clamp(6rem, 18vw, 12rem); font-weight: 900; letter-spacing: -0.05em;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
            line-height: 1; margin-bottom: 1rem;}
        .err-card { padding: 2rem; }
    </style>
</head>
<body>
    <div class="err-card">
        <div class="err-code">404</div>
        <h1 style="font-size: 1.75rem; font-weight: 800; margin-bottom: 0.5rem;">Page Not Found</h1>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">The page you're looking for doesn't exist or has been moved.</p>
        <a href="/" class="btn btn-primary btn-lg"><i class="fas fa-home"></i> Back to Home</a>
    </div>
</body>
</html>
