<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email — FlickZZ Resources</title>
    <link rel="icon" type="image/png" href="images/logo.png">
    <link rel="apple-touch-icon" href="images/logo.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body class="auth-page">
    <div class="auth-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="auth-wrapper">
        <a href="index.html" class="logo auth-logo">
            <img src="images/logo.png" alt="FlickZZ" class="logo-img logo-img-lg">
            <span>Flick<span class="logo-accent">ZZ</span></span>
        </a>

        <div class="auth-card">
            <div class="auth-header">
                <h1>Verify Your Email</h1>
                <p>Enter the 6-digit code sent to your email</p>
            </div>

            <form id="verifyForm" class="auth-form">
                <div class="form-group">
                    <label for="code">Verification Code</label>
                    <div class="input-wrap">
                        <i class="fas fa-key"></i>
                        <input type="text" id="code" placeholder="123456" maxlength="6" required autocomplete="off">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-block" id="verifyBtn">
                    <span>Verify Email</span>
                </button>
            </form>

            <div class="auth-footer" style="margin-top: 1rem;">
                <p>Didn't receive the code? <a href="#" id="resendCodeLink">Resend</a></p>
            </div>
            <div class="auth-footer">
                <a href="login.html">Back to Login</a>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script type="module" src="js/site-config.js"></script>
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/main.js"></script>
    <script type="module">
        import { showToast, translateFirebaseError } from './js/main.js';
        import { auth } from './js/firebase-config.js';

        // Get UID from URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const uid = urlParams.get('uid');

        if (!uid) {
            showToast('Invalid verification link. Please sign up again.', 'error');
            setTimeout(() => { window.location.href = 'signup.html'; }, 2000);
        }

        const form = document.getElementById('verifyForm');
        const verifyBtn = document.getElementById('verifyBtn');
        const codeInput = document.getElementById('code');

        // Auto-focus on input
        codeInput.focus();

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const code = codeInput.value.trim();
            if (!code || code.length !== 6) {
                showToast('Please enter a valid 6-digit code', 'warning');
                return;
            }

            setLoading(verifyBtn, true, 'Verifying...');

            try {
                const res = await fetch('/api/verify-email-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ uid, code })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Verification failed');

                showToast('Email verified successfully! Redirecting to login...', 'success');
                setTimeout(() => {
                    window.location.href = 'login.html?verified=1';
                }, 2000);
            } catch (err) {
                showToast(err.message, 'error');
                setLoading(verifyBtn, false, 'Verify Email');
                codeInput.value = '';
                codeInput.focus();
            }
        });

        // Resend code
        document.getElementById('resendCodeLink').addEventListener('click', async (e) => {
            e.preventDefault();
            // Get email from Firestore? We stored email in emailVerifications doc. But we can use uid to fetch.
            // Simpler: Redirect to signup again? Or we need to fetch email. Better to send a new code.
            // We'll create a simple API for resend.
            setLoading(verifyBtn, true, 'Sending...');
            try {
                const res = await fetch('/api/resend-verification-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ uid })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Failed to resend');
                showToast('New verification code sent to your email', 'success');
            } catch (err) {
                showToast(err.message, 'error');
            } finally {
                setLoading(verifyBtn, false, 'Verify Email');
            }
        });

        function setLoading(btn, loading, text) {
            btn.disabled = loading;
            btn.innerHTML = loading ? '<span class="spinner"></span> ' + text : '<span>' + text + '</span>';
        }
    </script>
    <script src="js/protection.js"></script>
</body>
</html>
