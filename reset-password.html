<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — FlickZZ Resources</title>
    <link rel="icon" type="image/png" href="images/logo.png">
    <link rel="apple-touch-icon" href="images/logo.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body class="auth-page">
    <div class="auth-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="auth-wrapper">
        <a href="index.html" class="logo auth-logo">
            <img src="images/logo.png" alt="FlickZZ" class="logo-img logo-img-lg">
            <span>Flick<span class="logo-accent">ZZ</span></span>
        </a>

        <div class="auth-card">
            <div class="auth-header">
                <h1>Reset Your Password</h1>
                <p>Enter your new password below.</p>
            </div>

            <form id="resetForm" class="auth-form">
                <div class="form-group">
                    <label for="password">New Password</label>
                    <div class="input-wrap">
                        <i class="fas fa-lock"></i>
                        <input 
                            type="password" 
                            id="password" 
                            placeholder="Enter new password" 
                            minlength="6" 
                            required
                        >
                    </div>
                    <small style="color: var(--text-muted); margin-top: 0.5rem; display: block;">
                        At least 6 characters
                    </small>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <div class="input-wrap">
                        <i class="fas fa-check-circle"></i>
                        <input 
                            type="password" 
                            id="confirmPassword" 
                            placeholder="Confirm password" 
                            required
                        >
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-block" id="resetBtn">
                    <span>Reset Password</span>
                </button>
            </form>

            <div class="auth-footer">
                <a href="login.html"><i class="fas fa-arrow-left"></i> Back to Login</a>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script type="module" src="js/site-config.js"></script>
    <script type="module" src="js/main.js"></script>
    <script type="module">
        import { showToast } from './js/main.js';

        // Get token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            showToast('Invalid reset link. Please request a new one.', 'error');
            setTimeout(() => { window.location.href = 'login.html'; }, 2000);
        }

        const form = document.getElementById('resetForm');
        const resetBtn = document.getElementById('resetBtn');
        const passwordInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirmPassword');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const password = passwordInput.value.trim();
            const confirm = confirmInput.value.trim();

            // Validation
            if (password.length < 6) {
                showToast('Password must be at least 6 characters', 'warning');
                return;
            }

            if (password !== confirm) {
                showToast('Passwords do not match', 'warning');
                confirmInput.focus();
                return;
            }

            setLoading(resetBtn, true, 'Resetting...');

            try {
                const res = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword: password })
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Reset failed');

                showToast('✅ Password reset successful! Redirecting to login...', 'success');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);
            } catch (err) {
                showToast(err.message || 'Failed to reset password', 'error');
                setLoading(resetBtn, false, 'Reset Password');
            }
        });

        function setLoading(btn, loading, text) {
            btn.disabled = loading;
            btn.innerHTML = loading
                ? '<span class="spinner"></span> ' + text
                : '<span>' + text + '</span>';
        }
    </script>
    <script src="js/protection.js"></script>
</body>
</html>
